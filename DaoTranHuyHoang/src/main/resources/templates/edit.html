<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chỉnh sửa thông tin</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1d2671, #c33764);
            color: #ffffff;
        }
        .card {
            width: min(90%, 620px);
            padding: 36px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.3);
        }
        h1 { margin: 0 0 18px; font-size: clamp(28px, 4vw, 34px); }
        label { display: block; margin-top: 12px; font-weight: 600; color: #ffd6e7; }
        input {
            width: 100%; padding: 10px 12px; border-radius: 10px; border: none; margin-top: 6px;
        }
        .actions { margin-top: 20px; display: flex; gap: 12px; }
        .btn {
            display: inline-block; padding: 10px 16px; border-radius: 10px; text-decoration: none; font-weight: 600;
        }
        .btn-primary { background: #ffd6e7; color: #5a164a; }
        .btn-secondary { background: transparent; color: #ffd6e7; border: 1px solid #ffd6e7; }
    </style>
    <meta name="referrer" content="no-referrer">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' data:">
    <script>
        function goBack(e) { e.preventDefault(); window.location.href = "/"; }
    </script>
    <meta name="color-scheme" content="light dark">
    <meta name="format-detection" content="telephone=no">
</head>
<body>
<main class="card">
    <h1>Chỉnh sửa thông tin</h1>
    <form th:action="@{/edit}" th:object="${profile}" method="post">
        <input type="hidden" th:field="*{id}">
        <label>Họ và tên</label>
        <input type="text" th:field="*{fullName}" placeholder="Nhập họ tên" required>
        <label>Nhóm</label>
        <input type="text" th:field="*{groupName}" placeholder="Nhập tên nhóm" required>
        <label>MSSV</label>
        <input type="text" th:field="*{studentId}" placeholder="Nhập MSSV" required>
        <div class="actions">
            <button class="btn btn-primary" type="submit">Lưu</button>
            <a class="btn btn-secondary" href="/" onclick="goBack(event)">Hủy</a>
        </div>
    </form>
    <div style="margin-top:10px;">
        <a class="btn btn-secondary" href="/">Quay lại</a>
    </div>
    <div style="margin-top:8px; font-size:12px; opacity:0.8;">Dữ liệu sẽ được lưu vào cơ sở dữ liệu.</div>
    <div style="display:none" aria-hidden="true"></div>
    <meta charset="utf-8">
    <meta name="robots" content="noindex,nofollow">
    <link rel="dns-prefetch" href="/">
    <link rel="preconnect" href="/">
    <link rel="prefetch" href="/">
    <link rel="prerender" href="/">
    <link rel="preload" href="/">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</main>
</body>
</html>
