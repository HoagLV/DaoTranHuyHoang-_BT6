name: CI/CD Spring Boot Docker

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout source
        uses: actions/checkout@v4

      # 2. Setup JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven   # 🔥 cache luôn cho nhanh

      # 3. Build project
      - name: Build with Maven
        working-directory: ./DaoTranHuyHoang
        run: mvn clean package -DskipTests

      # 4. Login Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 5. Build & Push Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./DaoTranHuyHoang
          push: true
          tags: |
              ${{ secrets.DOCKER_USERNAME }}/springboot-app:latest
              ${{ secrets.DOCKER_USERNAME }}/springboot-app:${{ github.run_number }}
      # 6. Triển khai lên DevOps Classroom (Bước mới thêm vào)
      - name: Triển khai lên DevOps Classroom
        run: |
          REPO="dthh2/dthh2"
          TAG="v4"
          CONTAINER_PORT=80  # Đổi từ 21210 thành 80
          
          # Gửi Webhook (Nhớ kiểm tra DEPLOY_URL trong Secrets nhé!)
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.DEPLOYURL }}?repo=$REPO&tag=$TAG&slot=2&container_port=$CONTAINER_PORT&strict_container_port=0")
          
          BODY=$(echo "$RESPONSE" | sed '$d')
          CODE=$(echo "$RESPONSE" | tail -n1)
          
          echo "Webhook Status: $CODE"
          if [ "$CODE" -eq 200 ]; then
            echo "✅ Deploy lên Port 80 thành công!"
          else
            echo "❌ Deploy thất bại. Mã lỗi: $CODE"
            exit 1
          fi
          
          echo "✅ Deploy thành công bản $TAG_NAME lên DevOps Classroom!"
          echo "::group::Kết quả trả về"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"
