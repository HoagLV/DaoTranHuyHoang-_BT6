name: CI/CD Spring Boot Docker

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout source
        uses: actions/checkout@v4

      # 2. Setup JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven   # 🔥 cache luôn cho nhanh

      # 3. Build project
      - name: Build with Maven
        working-directory: ./DaoTranHuyHoang
        run: mvn clean package -DskipTests

      # 4. Login Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 5. Build & Push Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./DaoTranHuyHoang
          push: true
          tags: |
              ${{ secrets.DOCKER_USERNAME }}/springboot-app:latest
              ${{ secrets.DOCKER_USERNAME }}/springboot-app:${{ github.run_number }}
